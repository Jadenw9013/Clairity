<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clairity</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="./popup.css" />
</head>

<body class="cl-ui" data-mode="simple">
  <header class="app-header">
    <div class="logo-area">
      <div class="status-dot"></div>
      <h1>Clairity</h1>
    </div>
    <div id="mode-toggle-container"></div>
  </header>

  <main class="app-main">
    <div class="input-card cl-card">
      <div class="input-header">
        <label for="prompt">Your prompt</label>
        <span id="char-count" class="char-count">0 / 10,000</span>
      </div>
      <textarea id="prompt" aria-label="Enter your prompt" placeholder="Paste your prompt here..."></textarea>
    </div>

    <div class="presets advanced-only cl-card" role="group" aria-label="Rewrite presets">
      <div class="preset-field">
        <label for="preset-intent">Category</label>
        <select id="preset-intent" aria-label="Prompt category" class="cl-input">
          <option value="">Auto-detect</option>
          <option value="coding">Coding</option>
          <option value="writing">Writing</option>
          <option value="research">Research</option>
          <option value="career">Career</option>
          <option value="general">General</option>
        </select>
      </div>
      <div class="preset-field">
        <label for="preset-format">Format</label>
        <select id="preset-format" aria-label="Output format" class="cl-input">
          <option value="paragraph">Paragraph</option>
          <option value="bullets">Bullet points</option>
          <option value="step-by-step">Step-by-step</option>
          <option value="json">JSON</option>
          <option value="code">Code</option>
        </select>
      </div>
      <div class="preset-field">
        <label for="preset-tone">Tone</label>
        <select id="preset-tone" aria-label="Response tone" class="cl-input">
          <option value="concise">Concise</option>
          <option value="detailed">Detailed</option>
          <option value="professional">Professional</option>
        </select>
      </div>
    </div>

    <button type="button" class="context-toggle advanced-only cl-text-btn" id="context-toggle" aria-expanded="false"
      aria-controls="context-section">
      + Add context
    </button>

    <div id="context-section" class="hidden advanced-only cl-card">
      <label for="extra-context">Additional context</label>
      <textarea id="extra-context" aria-label="Additional context for the rewrite"
        placeholder="Add background info, constraints, or goals..."></textarea>
    </div>

    <!-- API Key section -->
    <div id="apikey-section" class="cl-card apikey-card">
      <!-- STATE A: no key set -->
      <div id="apikey-state-a">
        <label for="apikey-input" class="apikey-label">Anthropic API Key</label>
        <div class="apikey-row">
          <input id="apikey-input" type="password" class="cl-input apikey-input"
            placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
          <button id="apikey-save" type="button" class="cl-btn-sm">Save</button>
        </div>
        <div id="apikey-error" class="apikey-error hidden" role="alert">Invalid key format — must start with sk-ant-</div>
        <a href="https://console.anthropic.com" target="_blank" class="cl-link apikey-help">
          Get your key at console.anthropic.com ↗
        </a>
      </div>
      <!-- STATE B: key set -->
      <div id="apikey-state-b" class="hidden">
        <div class="apikey-saved-row">
          <span class="apikey-label">API Key</span>
          <span id="apikey-masked" class="apikey-masked"></span>
          <button id="apikey-remove" type="button" class="cl-text-btn apikey-remove">Remove</button>
        </div>
      </div>
    </div>

    <button id="enhance" type="button" aria-label="Fix my question" class="cl-btn-ai">
      <span class="btn-text">Fix my question</span>
      <span class="btn-spinner hidden"></span>
    </button>

    <div id="result-section" class="cl-card hidden" aria-live="polite">
      <div class="result-header">
        <button id="copy-result" type="button" class="cl-copy-btn" aria-label="Copy enhanced prompt">
          Copy
        </button>
      </div>
      <div id="result" class="result-box"></div>

      <div class="compact-scores advanced-only">
        <!-- New compact 4-metric score visualization -->
        <div class="cl-score-row">
          <span class="score-label">Clarity</span>
          <div class="score-track">
            <div class="score-fill" id="score-clarity" style="width:0%"></div>
          </div>
        </div>
        <div class="cl-score-row">
          <span class="score-label">Specificity</span>
          <div class="score-track">
            <div class="score-fill" id="score-specificity" style="width:0%"></div>
          </div>
        </div>
        <div class="cl-score-row">
          <span class="score-label">Constraints</span>
          <div class="score-track">
            <div class="score-fill" id="score-constraints" style="width:0%"></div>
          </div>
        </div>
        <div class="cl-score-row overall">
          <span class="score-label">Overall</span>
          <div class="score-track">
            <div class="score-fill" id="score-overall" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div id="clarifying" class="clarifying-note hidden" role="note" aria-label="Clarifying suggestion"></div>
    </div>

    <div id="error" class="error-msg hidden" role="alert"></div>
  </main>

  <footer class="app-footer">
    <a href="../options/index.html" target="_blank" class="cl-link">Settings</a>
  </footer>

  <script src="./popup.js" type="module"></script>
</body>

</html>
