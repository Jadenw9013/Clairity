name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run test (vitest)
      run: npm test
      
    - name: Run typecheck
      run: npm run typecheck
      
    - name: Build backend
      run: npm run build --workspace=backend
      
    - name: Build extension
      run: npm run build --workspace=extension
